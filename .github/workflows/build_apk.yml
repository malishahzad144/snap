name: Build SnapFilter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger button on GitHub

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 ────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter ────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      # ── 4. Get packages ──────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 5. Analyze (optional, catches errors early) ──────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 6. Build Release APK ─────────────────────────────
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # ── 7. Upload APK as artifact ────────────────────────
      - name: Upload APK (arm64 - Modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: SnapFilter-arm64-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK (armeabi - Older phones)
        uses: actions/upload-artifact@v4
        with:
          name: SnapFilter-armeabi-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: SnapFilter-universal-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 8. Create GitHub Release ─────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
